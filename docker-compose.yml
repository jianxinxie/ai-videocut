services:
  backend:
    build:
      context: ./backend
    environment:
      APP_ENV: local
      COMFYUI_BASE_URL: http://host.docker.internal:8188
      UPLOAD_DIR: /data/uploads
      OUTPUT_DIR: /data/outputs
      TEMP_DIR: /data/temp
      DATA_DIR: /data/state
      TASK_STORE_PATH: /data/state/tasks.json
      STORAGE_PROVIDER: local
      QUEUE_BACKEND: background_tasks
      CORS_ORIGINS: http://127.0.0.1:5173,http://localhost:5173,http://127.0.0.1:8080,http://localhost:8080
    volumes:
      - backend-data:/data
    ports:
      - "8000:8000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  backend-data:
